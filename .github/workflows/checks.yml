name: Checks
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  lint:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - uses: reviewdog/action-setup@v1
      - name: Biome check
        run: |
          bunx biome ci . --reporter=checkstyle 2>/dev/null > .biome-report.xml || true
      - name: Post results
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s .biome-report.xml ]; then
            reviewdog -f=checkstyle -name="Biome" -reporter=github-pr-check -fail-level=error < .biome-report.xml
            reviewdog -f=checkstyle -reporter=rdjsonl -name="Biome" < .biome-report.xml > biome.rdjsonl
          else
            touch biome.rdjsonl
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reviewdog-biome-rdjsonl
          path: biome.rdjsonl
          if-no-files-found: ignore

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: reviewdog/action-setup@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep scan
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semgrep --config=p/default --sarif . 2>/dev/null > .semgrep.sarif || true
          if [ -s .semgrep.sarif ]; then
            reviewdog -f=sarif -name="Semgrep" -reporter=github-pr-check -level=warning < .semgrep.sarif
            reviewdog -f=sarif -reporter=rdjsonl -name="Semgrep" < .semgrep.sarif > semgrep.rdjsonl
          else
            touch semgrep.rdjsonl
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reviewdog-semgrep-rdjsonl
          path: semgrep.rdjsonl
          if-no-files-found: ignore

  policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-setup@v1
      - uses: actions/github-script@v7
        with:
          script: |
            const { run } = require('./.github/scripts/policy-checks.cjs');
            await run({ github, context });
      - name: Post results
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s .reviewdog-report.jsonl ]; then
            reviewdog -f=rdjsonl -name="check-files" -reporter=github-pr-check -fail-level=error < .reviewdog-report.jsonl
            cp .reviewdog-report.jsonl policy.rdjsonl
          else
            touch policy.rdjsonl
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reviewdog-policy-rdjsonl
          path: policy.rdjsonl
          if-no-files-found: ignore

  report:
    if: always() && github.event_name == 'pull_request'
    needs: [lint, semgrep, policy]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          pattern: reviewdog-*-rdjsonl
          path: ./findings
          merge-multiple: true
      - uses: actions/github-script@v7
        with:
          script: |
            const { run } = require('./.github/scripts/submit-report.cjs');
            await run({ github, context });

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
